<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Book Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>Book Inventory</h1>
  <table>
    <!--Kopf Tabelle-->
    <thead>
      <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Category</th>
      <th>Status</th>
      <th>Rate</th>
      </tr>
    </thead>
    <!--Tabelle Inhalt-->
    <tbody>
      <!--Ersten Artikel mit Status "Read"-->
      <tr class="read">
        <td>a</td>
        <td>a</td>
        <td>a</td>
        <td ><span class="status">Read</span></td>

        <!--Rate von Artikel-->
        <td>
          <span class="rate one">
            <span></span>
            <span></span>
            <span></span>
            </span>
            </td>
      </tr>
      <!--Artikel mit Status "In Progress"-->
      <tr class="in-progress">
        <td>a</td>
        <td>a</td>
        <td>a</td>
        <td ><span class="status">In Progress</span></td>
        <td>
           <!--Rate von Artikel mit 2 Stern-->
          <span class="rate two">
            <span></span>
            <span></span>
            <span></span>
            </span>
            </td>


      </tr>
      <!--Artikel mit Status "to-read"-->
      <tr class="to-read">
        <td>b</td>
        <td>b</td>
        <td>b</td>
        <td ><span class="status">To Read </span></td>
        <td>
          <span class="rate">
            <span></span>
            <span></span>
            <span></span>
            </span>
            </td>


      </tr>
      <tr class="read">
        <td>Echt Name </td>
        <td>PtQ</td>
        <td>Keine</td>
        <td><span class="status">Read </span></td>
        <td>
           <!--Rate von Artikel mit 3 Stern-->
          <span class="rate three">
            <span></span>
            <span></span>
            <span></span>
            </span>
            </td>

      </tr>


    </tbody>


  </table>
</body>

</html>
